openapi: 3.1.0
info:
  title: ENEM Essay Correction API
  version: 0.1.0
  description: API contract for auth, essay correction, history, and deletion.
servers:
  - url: /api
tags:
  - name: auth
  - name: corrections
paths:
  /auth/register:
    post:
      tags: [auth]
      summary: Register a new user
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
  /auth/login:
    post:
      tags: [auth]
      summary: Log in with email and password
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/logout:
    post:
      tags: [auth]
      summary: Log out the current session
      operationId: logoutUser
      security:
        - sessionCookie: []
      responses:
        '204':
          description: Logged out
        '401':
          $ref: '#/components/responses/Unauthorized'
  /corrections:
    get:
      tags: [corrections]
      summary: List the current user's corrections
      operationId: listCorrections
      security:
        - sessionCookie: []
      responses:
        '200':
          description: History list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CorrectionListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [corrections]
      summary: Submit an essay for correction
      operationId: createCorrection
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EssayTextRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EssayUploadRequest'
      responses:
        '201':
          description: Correction completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CorrectionResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '500':
          $ref: '#/components/responses/ServerError'
  /corrections/{correctionId}:
    get:
      tags: [corrections]
      summary: Read a previously saved correction
      operationId: getCorrection
      security:
        - sessionCookie: []
      parameters:
        - $ref: '#/components/parameters/CorrectionId'
      responses:
        '200':
          description: Saved correction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CorrectionResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [corrections]
      summary: Delete a saved correction and its essay history
      operationId: deleteCorrection
      security:
        - sessionCookie: []
      parameters:
        - $ref: '#/components/parameters/CorrectionId'
      responses:
        '204':
          description: Deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: session
  parameters:
    CorrectionId:
      name: correctionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: User does not own the resource
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Resource already exists
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unprocessable:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServerError:
      description: Unexpected server failure
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        name:
          type: string
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    AuthResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: '#/components/schemas/UserProfile'
        sessionExpiresAt:
          type: string
          format: date-time
    UserProfile:
      type: object
      required: [id, email]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: [string, 'null']
    EssayTextRequest:
      type: object
      required: [essayText]
      properties:
        essayText:
          type: string
          minLength: 1
    EssayUploadRequest:
      type: object
      properties:
        essayText:
          type: string
        file:
          type: string
          format: binary
      description: Provide either essayText or file. The server validates that exactly one source is present.
    CorrectionListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CorrectionSummary'
        nextCursor:
          type: [string, 'null']
    CorrectionSummary:
      type: object
      required: [id, essayId, sourceType, createdAt]
      properties:
        id:
          type: string
          format: uuid
        essayId:
          type: string
          format: uuid
        sourceType:
          type: string
          enum: [text, file]
        preview:
          type: string
        finalScore:
          type: [integer, 'null']
          minimum: 0
          maximum: 1000
        createdAt:
          type: string
          format: date-time
    CorrectionResult:
      type: object
      required:
        - id
        - essayId
        - finalScore
        - competencies
        - grammarErrors
        - improvementSuggestions
        - detailedFeedback
        - rewrittenEssay
      properties:
        id:
          type: string
          format: uuid
        essayId:
          type: string
          format: uuid
        finalScore:
          type: integer
          minimum: 0
          maximum: 1000
        competencies:
          type: array
          minItems: 5
          maxItems: 5
          items:
            $ref: '#/components/schemas/CompetencyScore'
        grammarErrors:
          type: array
          items:
            $ref: '#/components/schemas/GrammarError'
        improvementSuggestions:
          type: array
          items:
            type: string
        detailedFeedback:
          type: string
        rewrittenEssay:
          type: string
        createdAt:
          type: string
          format: date-time
    CompetencyScore:
      type: object
      required: [code, name, score]
      properties:
        code:
          type: string
          enum: [C1, C2, C3, C4, C5]
        name:
          type: string
        score:
          type: integer
          minimum: 0
          maximum: 200
        note:
          type: string
    GrammarError:
      type: object
      required: [excerpt, issue, suggestion]
      properties:
        excerpt:
          type: string
        issue:
          type: string
        suggestion:
          type: string
        severity:
          type: string
          enum: [low, medium, high]
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: [object, 'null']
